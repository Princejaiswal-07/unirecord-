<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <link rel="shortcut icon" href="https://chatgpt.com/backend-api/estuary/content?id=file_00000000c3c8720b962d3b48329cb8be&ts=492898&p=fs&cid=1&sig=0ae4919e5be996bd8edc721b31d267f356a83522693ff5c051a9e0de269bbe8a&v=0" type="image/x-icon"> -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astraverse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="login-body">
    <button class="theme-toggle theme-toggle-login" id="themeToggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-graduation-cap"></i>
                <h2>Astraverse</h2>
                <p>Enter your credentials to access your dashboard</p>
            </div>
            <form action="index.html" class="login-form">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" placeholder="Student ID / Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <div class="login-footer">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
